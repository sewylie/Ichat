<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messenger</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Screen 1: Pick a username -->
  <div id="login-screen">
    <div class="login-box">
      <h1>Messenger</h1>
      <p>Pick a username to start chatting</p>
      <input type="text" id="username-input" placeholder="Your name..." maxlength="20" autocomplete="off">
      <button id="join-btn">Join</button>
      <p id="login-error" class="error"></p>
    </div>
  </div>

  <!-- Screen 2: The chat app -->
  <div id="chat-screen" class="hidden">

    <!-- Left sidebar: online users -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <h2>Online</h2>
        <span id="user-count">0</span>
      </div>
      <ul id="user-list"></ul>
      <div class="sidebar-footer">
        <button id="copy-link-btn">Copy Invite Link</button>
        <span id="link-copied" class="hidden">Copied!</span>
      </div>
    </aside>

    <!-- Right side: chat area -->
    <main id="chat-area">
      <div id="no-chat-selected">
        <p>Select someone from the sidebar to start chatting</p>
      </div>

      <div id="active-chat" class="hidden">
        <div id="chat-header">
          <span id="chat-with-name"></span>
        </div>
        <div id="messages"></div>
        <div id="typing-indicator" class="hidden">
          <span class="typing-dots"><span></span><span></span><span></span></span>
          <span id="typing-name"></span> is typing...
        </div>
        <div id="message-input-area">
          <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
          <button id="send-btn">Send</button>
        </div>
      </div>
    </main>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
